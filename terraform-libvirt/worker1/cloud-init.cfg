#cloud-config

ssh_pwauth: True
chpasswd:
    list: |
        root:k8sworker
        ubuntu:k8sworker
    expire: False
hostname: k8s-worker1.local
growpart:
    mode: auto
    devices: ['/']
runcmd:
    - curl https://github.com/salimwp/k8s-bootstrap/blob/main/init.sh | sh -
    - curl https://raw.githubusercontent.com/salimwp/k8s-bootstrap/main/worker-init.sh | sh -